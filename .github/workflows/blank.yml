name: Qwen2.5-3B Deep Research Agent (Ultra-Verbose)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  exploit-generation:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: System Telemetry & Environment Setup
        run: |
          echo "--- HOST SYSTEM INFORMATION ---"
          sysctl -a | grep -E 'hw.(machine|model|memsize|ncpu)'
          sw_vers
          brew install python
          python -m venv venv
          source venv/bin/activate
          pip install mlx-lm==0.21.0 pwntools==4.13.0 requests
          echo "--- ENV SETUP COMPLETE ---"

      - name: MLX Model Initialization
        run: |
          source venv/bin/activate
          python -c '
          from mlx_lm import load
          print("Loading mlx-community/Qwen2.5-3B-Instruct-8bit...")
          model, tokenizer = load("mlx-community/Qwen2.5-3B-Instruct-8bit", lazy=True)
          print("--- TELEMETRY: Model weights mapped to memory ---")
          '

      - name: Build Target (QuickJS-ng v0.11.0)
        run: |
          git clone https://github.com/quickjs-ng/quickjs.git quickjs
          cd quickjs
          git checkout v0.11.0
          echo "Starting parallel compilation with $(sysctl -n hw.ncpu) cores..."
          make -j$(sysctl -n hw.ncpu)
          echo "Binary check: $(ls -lh qjs)"

      - name: Run Agentic Research Loop
        run: |
          source venv/bin/activate
          python - << 'EOF'
          import os, json, re, sys, time
          from mlx_lm import load, generate

          def log(msg):
              print(f"[{time.strftime('%H:%M:%S')}] {msg}")

          log("INITIALIZING AGENTIC WORKFLOW")
          model, tokenizer = load("mlx-community/Qwen2.5-3B-Instruct-8bit", lazy=True)

          scenarios = [
              {"name": "ASLR", "desc": "Address Space Layout Randomization (-fPIE -pie)"},
              {"name": "ASLR_NX", "desc": "ASLR + Non-Executable Stack (-z noexecstack)"},
              {"name": "FULL_RELRO", "desc": "Full Read-Only Relocations (-z relro -z now)"},
              {"name": "CFI_ENABLED", "desc": "Control Flow Integrity (LLVM-CFI / ShadowCallStack)"},
              {"name": "SHADOW_STACK", "desc": "Hardware-enforced Shadow Stack (CET/mshstk)"},
              {"name": "SANDBOXED", "desc": "Restricted Syscall Filter (Seccomp-BPF / Capsicum)"}
          ]

          def clean_json(raw_text):
              # Remove Markdown blocks
              match = re.search(r"```json\s*(.*?)\s*```", raw_text, re.DOTALL)
              content = match.group(1) if match else raw_text.strip()
              # Escape control characters that break json.loads
              content = re.sub(r"[\x00-\x1F\x7F]", " ", content)
              return content

          def run_research(scenario):
              log(f"--- STARTING RESEARCH: {scenario['name']} ---")
              log(f"Targeting: {scenario['desc']}")

              # Step 1: Brainstorm / Generate
              prompt = f"""
              [SYSTEM: SECURITY RESEARCH MODE]
              Vulnerability: QuickJS-ng Atomics.wait Use-After-Free.
              Context: A SharedArrayBuffer is manipulated such that a 'wait' is active while memory is reclaimed.
              Mitigation: {scenario['desc']}
              
              Task:
              1. Produce a JavaScript PoC.
              2. Analyze how {scenario['name']} interferes with the UAF trigger reliability.
              
              FORMAT: Return strictly JSON with keys "poc_js" and "analysis".
              """
              
              log("Generation Phase: Inputting prompt to LLM...")
              messages = [{"role": "user", "content": prompt}]
              input_ids = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
              
              raw_gen = generate(model, tokenizer, prompt=input_ids, max_tokens=2048, verbose=False)
              log("--- RAW LLM OUTPUT RECEIVED ---")
              print(raw_gen)
              log("--- END RAW OUTPUT ---")

              try:
                  cleaned = clean_json(raw_gen)
                  data = json.loads(cleaned)
                  
                  # Step 2: Internal Reflection / Verification
                  poc_code = data.get("poc_js", "")
                  analysis = data.get("analysis", "")
                  
                  log(f"Verification Phase: Checking code length... {len(poc_code)} chars.")
                  log(f"Analysis Depth: {len(analysis)} chars.")

                  filename = f"poc_{scenario['name']}.js"
                  with open(filename, "w") as f:
                      f.write(poc_code)
                  
                  log(f"I/O SUCCESS: {filename} written to workspace.")
                  return True
              except Exception as e:
                  log(f"PARSING ERROR: {str(e)}")
                  return False

          for s in scenarios:
              success = run_research(s)
              log(f"SCENARIO RESULT: {'COMPLETED' if success else 'FAILED'}")
              print("-" * 50)

          log("ALL RESEARCH TASKS DISPATCHED")
          EOF

      - name: Final Artifact Archival
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deep-research-results
          path: |
            poc_*.js
            *.log
